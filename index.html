<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge TTS Studio - Admin Đức Dương</title>
    <!-- Tailwind CSS for modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for single-file implementation -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Windows-style UI effects */
        .win-shadow { box-shadow: inset 1px 1px #fff, 1px 1px #888; border: 1px solid #444; }
        .win-input { border: 1px solid #7a7a7a; box-shadow: inset 1px 1px 2px #ddd; }
        .win-btn { background: linear-gradient(#eee, #ccc); border: 1px solid #707070; transition: 0.1s; cursor: pointer; }
        .win-btn:active { background: linear-gradient(#ccc, #eee); box-shadow: inset 1px 1px 2px #888; }
        .win-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-[#f0f0f0] text-[13px] text-[#222]">
    <div id="root"></div>

    <script type="text/babel">
        // LƯU Ý: THAY ĐỔI LINK DƯỚI ĐÂY BẰNG LINK WEB APP GOOGLE CỦA BẠN (CẦN TRIỂN KHAI MỚI - NEW DEPLOYMENT)
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQRJEsU1mnb4PK9BjABbhd-OxpfDXcLOPC8QY0PZtGXnczpvd60Jbf1IracYuTHTanFQ/exec";

        const { useState, useEffect, useRef } = React;

        function App() {
            // --- AUTHENTICATION STATES ---
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [authForm, setAuthForm] = useState({ username: '', password: '' });
            const [showPass, setShowPass] = useState(false);
            const [authMsg, setAuthMsg] = useState({ t: '', m: '' });
            const [loading, setLoading] = useState(false);

            // --- APP LOGIC STATES ---
            const [activeTab, setActiveTab] = useState('text');
            const [text, setText] = useState('');
            const [files, setFiles] = useState([]);
            const [outputName, setOutputName] = useState('');
            const [dirHandle, setDirHandle] = useState(null);
            const [voices, setVoices] = useState({});
            const [config, setConfig] = useState({ lang: '', voice: '', rate: 1.0, pitch: 0, vol: 100, chunk: 450, srt: true });
            const [status, setStatus] = useState('Sẵn sàng.');
            const [progress, setProgress] = useState(0);
            const [isProcessing, setIsProcessing] = useState(false);

            // Fetch voices list on successful login
            useEffect(() => { if (isAuthenticated) fetchVoices(); }, [isAuthenticated]);

            const fetchVoices = async () => {
                setStatus('Đang tải danh sách giọng đọc...');
                try {
                    const res = await fetch('https://speech.platform.bing.com/consumer/speech/synthesize/readaloud/voices/list?trustedclienttoken=6A5AA1D4EAFF4E9FB37E23D68491D6F4');
                    const data = await res.json();
                    const grouped = {};
                    data.forEach(v => {
                        const locale = new Intl.DisplayNames(['vi'], { type: 'language' }).of(v.Locale) || v.Locale;
                        if (!grouped[locale]) grouped[locale] = [];
                        grouped[locale].push({ id: v.ShortName, name: v.FriendlyName });
                    });
                    setVoices(grouped);
                    const vi = Object.keys(grouped).find(k => k.includes('Việt'));
                    if (vi) setConfig(prev => ({ ...prev, lang: vi, voice: grouped[vi][0].id }));
                    setStatus('Sẵn sàng.');
                } catch (e) { setStatus('Lỗi tải danh sách giọng.'); }
            };

            // Authentication Handler
            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true); 
                setAuthMsg({ t: 'info', m: 'Đang kết nối máy chủ xác thực...' });
                
                try {
                    // Clean inputs to avoid whitespace issues
                    const u = authForm.username.trim();
                    const p = authForm.password.trim();
                    
                    const url = `${GOOGLE_SCRIPT_URL}?action=${authMode}&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    if (data.success) {
                        if (authMode === 'login') { 
                            setIsAuthenticated(true); 
                            setAuthMsg({ t: '', m: '' });
                        } else { 
                            setAuthMsg({ t: 'success', m: data.message }); 
                            setAuthMode('login'); 
                        }
                    } else { 
                        setAuthMsg({ t: 'error', m: data.message }); 
                    }
                } catch (e) { 
                    setAuthMsg({ t: 'error', m: 'Lỗi kết nối! Hãy kiểm tra link script có đuôi /exec chưa.' }); 
                } finally { 
                    setLoading(false); 
                }
            };

            // Edge TTS Synthesis Engine
            const synthesize = (chunk) => {
                return new Promise((resolve, reject) => {
                    const connId = 'xxxxxxxxxxxx4xxxyxxxxxxxxxxxxxxx'.replace(/[xy]/g, (c) => (c==='x'?Math.random()*16|0:(Math.random()*16|0&0x3|0x8)).toString(16));
                    // Fix: Adding ConnectionId and Sec-MS-GEC-Version for Azure compliance
                    const ws = new WebSocket(`wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=6A5AA1D4EAFF4E9FB37E23D68491D6F4&ConnectionId=${connId}&Sec-MS-GEC-Version=1-130.0.2849.68`);
                    let audioData = [];
                    const timer = setTimeout(() => { ws.close(); reject(new Error("Hết thời gian chờ Azure")); }, 30000);
                    
                    ws.onopen = () => {
                        const ts = new Date().toString();
                        ws.send(`X-Timestamp:${ts}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`);
                        const r = Math.round((config.rate - 1) * 100);
                        const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='vi-VN'><voice name='${config.voice}'><prosody pitch='${config.pitch}Hz' rate='${r>=0?'+':''}${r}%' volume='${config.vol-100}%'>${chunk.replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</prosody></voice></speak>`;
                        ws.send(`X-RequestId:${connId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${ts}\r\nPath:ssml\r\n\r\n${ssml}`);
                    };
                    ws.onmessage = async (e) => {
                        if (typeof e.data === 'string' && e.data.includes("Path:turn.end")) { 
                            clearTimeout(timer); ws.close(); resolve(new Blob(audioData, {type:'audio/mp3'})); 
                        }
                        else if (e.data instanceof Blob) { 
                            const b = await e.data.arrayBuffer(); 
                            const headLen = new DataView(b).getUint16(0);
                            audioData.push(b.slice(2 + headLen)); 
                        }
                    };
                    ws.onerror = () => reject(new Error("Lỗi mạng WebSocket (Tắt Adblock nếu có)"));
                });
            };

            const processAll = async () => {
                setIsProcessing(true); setProgress(0); setStatus('Đang chuẩn bị...');
                try {
                    const run = async (c, n) => {
                        const blob = await synthesize(c);
                        if (dirHandle) { 
                            const h = await dirHandle.getFileHandle(`${n}.mp3`, {create:true}); 
                            const w = await h.createWritable(); await w.write(blob); await w.close(); 
                        } else { 
                            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${n}.mp3`; a.click(); 
                        }
                    };
                    if (activeTab === 'text') { 
                        await run(text, outputName || `Audio_${Date.now()}`); 
                        setProgress(100); 
                    } else { 
                        for(let i=0; i<files.length; i++) { 
                            setStatus(`Đang xử lý file: ${files[i].name}`);
                            await run(await files[i].text(), files[i].name.replace('.txt',''));
                            setProgress(Math.round(((i+1)/files.length)*100));
                        }
                    }
                    setStatus('Đã hoàn tất!');
                } catch(e) { 
                    setStatus(`Lỗi: ${e.message}`); 
                } finally { 
                    setIsProcessing(false); 
                }
            };

            // --- LOGIN UI ---
            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#f5f5f5]">
                    <div className="bg-white p-10 win-shadow w-full max-w-[450px]">
                        <h2 className="text-center text-3xl font-bold text-blue-700 mb-8 underline decoration-blue-200 underline-offset-8">Edge TTS Studio</h2>
                        <div className="flex border-b mb-8 bg-gray-100 p-1.5 rounded shadow-inner">
                            <button onClick={() => setAuthMode('login')} className={`flex-1 py-2.5 font-bold transition-all ${authMode === 'login' ? 'bg-white shadow text-blue-600 rounded' : 'text-gray-500 hover:text-gray-700'}`}>Đăng nhập</button>
                            <button onClick={() => setAuthMode('register')} className={`flex-1 py-2.5 font-bold transition-all ${authMode === 'register' ? 'bg-white shadow text-blue-600 rounded' : 'text-gray-500 hover:text-gray-700'}`}>Đăng ký</button>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-6">
                            <div>
                                <label className="block font-bold mb-1.5 text-gray-700 uppercase text-[11px] tracking-widest">Tài khoản:</label>
                                <input type="text" className="w-full win-input p-3 outline-none focus:border-blue-500 bg-gray-50" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required placeholder="Nhập tài khoản của bạn" />
                            </div>
                            <div>
                                <label className="block font-bold mb-1.5 text-gray-700 uppercase text-[11px] tracking-widest">Mật khẩu:</label>
                                <div className="relative">
                                    <input type={showPass ? "text" : "password"} className="w-full win-input p-3 outline-none pr-14 focus:border-blue-500 bg-gray-50" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} required placeholder="Nhập mật khẩu" />
                                    <button type="button" onClick={() => setShowPass(!showPass)} className="absolute right-1 top-1 text-[10px] bg-gray-200 hover:bg-gray-300 border border-gray-400 px-2.5 py-2 font-bold transition-colors uppercase rounded">
                                        {showPass ? "ẨN" : "XEM"}
                                    </button>
                                </div>
                            </div>
                            {authMsg.m && (
                                <div className={`p-4 text-[12px] border-l-4 shadow-sm ${authMsg.t==='error'?'bg-red-50 text-red-700 border-red-500':'bg-blue-50 text-blue-700 border-blue-500'}`}>
                                    <b>{authMsg.t === 'error' ? 'LỖI: ' : 'THÔNG BÁO: '}</b> {authMsg.m}
                                </div>
                            )}
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-3.5 font-bold hover:bg-blue-700 disabled:bg-gray-400 shadow-lg uppercase tracking-widest text-[14px] transition-all active:scale-95">
                                {loading ? 'ĐANG KIỂM TRA...' : (authMode==='login'?'Đăng nhập hệ thống':'Gửi yêu cầu đăng ký')}
                            </button>
                        </form>
                        <div className="mt-10 text-center border-t pt-6">
                            <p className="font-bold text-blue-900 text-[13px]">LIÊN HỆ ADMIN ĐỨC DƯƠNG</p>
                            <p className="text-red-600 font-bold mt-2 bg-red-50 inline-block px-4 py-1 rounded-full border border-red-100 shadow-sm">Zalo: 0332.696.777</p>
                        </div>
                    </div>
                </div>
            );

            // --- MAIN APP UI ---
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-[#f0f0f0] border border-[#888] shadow-2xl w-full max-w-[1080px] h-[90vh] flex flex-col overflow-hidden">
                        <div className="bg-white p-2.5 border-b border-gray-300 flex justify-between items-center text-[12px] shadow-sm">
                            <span className="font-bold text-gray-600 italic">Microsoft Azure Text-to-Speech Studio - Nền tảng: Microsoft Edge API</span>
                            <div className="flex items-center gap-4">
                                <span className="text-blue-700 font-bold uppercase border-r pr-4">Hội viên: {authForm.username}</span>
                                <button onClick={() => setIsAuthenticated(false)} className="win-btn px-4 py-1 font-bold text-red-700 hover:text-red-900 border-[#999]">ĐĂNG XUẤT</button>
                            </div>
                        </div>
                        <div className="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
                            <div className="flex bg-[#ddd] border border-[#bbb] rounded-t-lg overflow-hidden">
                                <button onClick={()=>setActiveTab('text')} className={`px-8 py-2.5 border-r border-[#bbb] transition-all ${activeTab==='text'?'bg-white font-bold text-blue-700 shadow-inner':'hover:bg-[#eee]'}`}>VĂN BẢN</button>
                                <button onClick={()=>setActiveTab('files')} className={`px-8 py-2.5 border-r border-[#bbb] transition-all ${activeTab==='files'?'bg-white font-bold text-blue-700 shadow-inner':'hover:bg-[#eee]'}`}>XỬ LÝ FILE HÀNG LOẠT</button>
                            </div>
                            <div className="flex-1 bg-white win-input overflow-hidden flex flex-col shadow-inner">
                                {activeTab==='text' ? <textarea className="flex-1 p-5 outline-none resize-none text-[15px] leading-relaxed font-normal" value={text} onChange={e=>setText(e.target.value)} placeholder="Nhập hoặc dán văn bản của bạn vào đây (Hỗ trợ tiếng Việt tự nhiên nhất)..."/> : 
                                <div className="flex-1 p-4 bg-[#f9f9f9] flex flex-col gap-3 overflow-hidden">
                                    <div className="flex justify-between items-center bg-white p-3 border rounded shadow-sm">
                                        <span className="font-bold text-blue-800">📁 Đã chọn: {files.length} tập tin</span>
                                        <div className="flex gap-2">
                                            <label className="win-btn px-5 py-1.5 text-xs font-bold cursor-pointer rounded">CHỌN FILE .TXT<input type="file" multiple accept=".txt" className="hidden" onChange={e=>setFiles([...files,...Array.from(e.target.files)])}/></label>
                                            <button onClick={()=>setFiles([])} className="win-btn px-5 py-1.5 text-xs font-bold rounded">XÓA TẤT CẢ</button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-2 p-1">
                                        {files.map((f,i)=><div key={i} className="py-2.5 px-4 border rounded text-blue-800 font-medium bg-white shadow-sm flex items-center gap-3"><span className="text-gray-400">📄</span> {f.name} <span className="text-[10px] text-gray-400 ml-auto">{(f.size/1024).toFixed(1)} KB</span></div>)}
                                        {files.length === 0 && <div className="text-center mt-24 text-gray-400 italic">Kéo thả file .txt vào đây để xử lý hàng chục file cùng lúc...</div>}
                                    </div>
                                </div>}
                            </div>
                            <div className="flex items-center gap-4 bg-[#e8eef7] p-3 border border-blue-200 rounded-lg shadow-sm">
                                <span className="font-bold text-blue-900 whitespace-nowrap">Tên file xuất:</span>
                                <input className="flex-1 win-input p-2 outline-none focus:bg-white" value={outputName} onChange={e=>setOutputName(e.target.value)} placeholder="Để trống để tự đặt theo ngày giờ..."/>
                                <button className="win-btn px-6 py-2 font-bold flex items-center gap-2 rounded shadow" onClick={async ()=>{try{setDirHandle(await window.showDirectoryPicker({mode:'readwrite'}));}catch(e){}}}>
                                    {dirHandle ? `✅ ${dirHandle.name}` : "📁 CHỌN THƯ MỤC LƯU"}
                                </button>
                            </div>
                            <fieldset className="border border-[#aaa] p-5 pt-7 relative mt-1 bg-white rounded-lg shadow-sm">
                                <legend className="absolute -top-3 left-6 bg-blue-700 text-white px-4 py-0.5 font-bold uppercase text-[10px] rounded-full shadow-md">Cấu hình giọng đọc AI</legend>
                                <div className="grid grid-cols-12 gap-y-4 gap-x-8 items-center">
                                    <div className="col-span-1 font-bold text-gray-600 whitespace-nowrap">Ngôn ngữ:</div>
                                    <select className="col-span-5 win-input p-2 outline-none bg-gray-50 rounded" value={config.lang} onChange={e=>setConfig({...config,lang:e.target.value,voice:voices[e.target.value][0].id})}>{Object.keys(voices).map(l=><option key={l} value={l}>{l}</option>)}</select>
                                    <div className="col-span-1 text-right font-bold text-gray-600 whitespace-nowrap">Giọng:</div>
                                    <select className="col-span-5 win-input p-2 outline-none bg-gray-50 rounded" value={config.voice} onChange={e=>setConfig({...config,voice:e.target.value})}>{voices[config.lang]?.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</select>
                                    
                                    <div className="col-span-1 font-bold text-gray-600 whitespace-nowrap">Tốc độ:</div>
                                    <div className="col-span-3 flex gap-2 items-center">
                                        <input type="number" step="0.1" className="w-24 win-input p-2 text-right rounded" value={config.rate} onChange={e=>setConfig({...config,rate:parseFloat(e.target.value)})}/>
                                        <span className="text-gray-400 text-[10px] italic">(0.5 ~ 2.0)</span>
                                    </div>
                                    
                                    <div className="col-span-2 text-right font-bold text-gray-600 whitespace-nowrap">Cao độ (Hz):</div>
                                    <input type="number" className="col-span-2 win-input p-2 text-right rounded" value={config.pitch} onChange={e=>setConfig({...config,pitch:parseInt(e.target.value)})}/>
                                    
                                    <div className="col-span-2 text-right font-bold text-gray-600 whitespace-nowrap">Âm lượng:</div>
                                    <div className="col-span-2 flex gap-1">
                                        <input type="number" className="flex-1 win-input p-2 text-right rounded" value={config.vol} onChange={e=>setConfig({...config,vol:parseInt(e.target.value)})}/>
                                        <button className="win-btn px-2 text-[9px] font-bold rounded" onClick={()=>setConfig({...config,rate:1,pitch:0,vol:100})}>MẶC ĐỊNH</button>
                                    </div>
                                    
                                    <div className="col-span-12 flex items-center gap-8 mt-2 border-t pt-4">
                                        <label className="flex items-center gap-3 cursor-pointer group">
                                            <input type="checkbox" checked={config.srt} onChange={e=>setConfig({...config,srt:e.target.checked})} className="w-5 h-5 accent-blue-600 cursor-pointer" /> 
                                            <b className="group-hover:text-blue-700 text-[13px]">XUẤT KÈM PHỤ ĐỀ (.SRT) KHỚP GIỌNG</b>
                                        </label>
                                        <div className="text-gray-300">|</div>
                                        <div className="flex gap-3 items-center">
                                            <span className="font-bold text-gray-500 whitespace-nowrap">Số từ mỗi đoạn:</span>
                                            <input type="number" className="w-20 win-input p-1.5 text-center rounded" value={config.chunk} onChange={e=>setConfig({...config, chunk: parseInt(e.target.value)})} /> 
                                            <span className="text-[11px] text-gray-400 underline">(Tăng nếu muốn đọc nhanh hơn)</span>
                                        </div>
                                    </div>
                                </div>
                            </fieldset>
                        </div>
                        <div className="bg-[#ddd] p-4 flex items-center gap-6 border-t border-[#999] shadow-inner">
                            <div className="w-64 truncate font-mono text-[11px] text-blue-800 font-bold bg-[#eee] p-2 border border-[#bbb] rounded shadow-inner" title={status}>🔹 Trạng thái: {status}</div>
                            <div className="flex-1 bg-white border border-[#888] h-7 relative overflow-hidden shadow-inner rounded-full">
                                <div className="bg-gradient-to-r from-green-400 to-green-600 h-full transition-all duration-300 shadow-[0_0_15px_rgba(34,197,94,0.6)]" style={{width:`${progress}%`}}/>
                                <div className="absolute inset-0 flex items-center justify-center font-bold text-[11px] text-shadow drop-shadow-sm">{progress}%</div>
                            </div>
                            <button onClick={processAll} disabled={isProcessing||(activeTab==='text'&&!text.trim())||(activeTab==='files'&&files.length===0)} className="bg-blue-700 text-white px-16 py-3 font-bold hover:bg-blue-800 shadow-xl active:shadow-inner active:scale-95 transition-all uppercase tracking-widest text-[16px] rounded border-b-4 border-blue-900">
                                {isProcessing ? '⚡ ĐANG XỬ LÝ...' : '🚀 TẠO VÀ LƯU NGAY'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
