<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge TTS Studio - Admin Đức Dương</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Hiệu ứng Windows-style cho các thành phần */
        .win-shadow { box-shadow: inset 1px 1px #fff, 1px 1px #888; border: 1px solid #444; }
        .win-input { border: 1px solid #7a7a7a; box-shadow: inset 1px 1px 2px #ddd; }
        .win-btn { background: linear-gradient(#eee, #ccc); border: 1px solid #707070; transition: 0.1s; cursor: pointer; }
        .win-btn:active { background: linear-gradient(#ccc, #eee); box-shadow: inset 1px 1px 2px #888; }
        .win-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-[#f0f0f0] text-[13px] text-[#222]">
    <div id="root"></div>

    <script type="text/babel">
        // LƯU Ý: THAY ĐỔI LINK DƯỚI ĐÂY BẰNG LINK WEB APP GOOGLE CỦA BẠN (KẾT THÚC BẰNG /EXEC)
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQPLxLHHZ_Y8DA2T2HwOWHhu4V1kxLJDBKA5A90gk7ux6BPCeglrnVpck6I_GqjXa99w/exec";

        const { useState, useEffect, useRef } = React;

        function App() {
            // --- AUTH STATES ---
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [authForm, setAuthForm] = useState({ username: '', password: '' });
            const [showPass, setShowPass] = useState(false);
            const [authMsg, setAuthMsg] = useState({ t: '', m: '' });
            const [loading, setLoading] = useState(false);

            // --- APP STATES ---
            const [activeTab, setActiveTab] = useState('text');
            const [text, setText] = useState('');
            const [files, setFiles] = useState([]);
            const [outputName, setOutputName] = useState('');
            const [dirHandle, setDirHandle] = useState(null);
            
            const [voices, setVoices] = useState({});
            const [config, setConfig] = useState({ lang: '', voice: '', rate: 1.0, pitch: 0, vol: 100, chunk: 450, srt: true });
            const [status, setStatus] = useState('Sẵn sàng.');
            const [progress, setProgress] = useState(0);
            const [isProcessing, setIsProcessing] = useState(false);

            useEffect(() => { if (isAuthenticated) fetchVoices(); }, [isAuthenticated]);

            const fetchVoices = async () => {
                try {
                    const res = await fetch('https://speech.platform.bing.com/consumer/speech/synthesize/readaloud/voices/list?trustedclienttoken=6A5AA1D4EAFF4E9FB37E23D68491D6F4');
                    const data = await res.json();
                    const grouped = {};
                    data.forEach(v => {
                        const locale = new Intl.DisplayNames(['vi'], { type: 'language' }).of(v.Locale) || v.Locale;
                        if (!grouped[locale]) grouped[locale] = [];
                        grouped[locale].push({ id: v.ShortName, name: v.FriendlyName });
                    });
                    setVoices(grouped);
                    const vi = Object.keys(grouped).find(k => k.includes('Việt'));
                    if (vi) setConfig(prev => ({ ...prev, lang: vi, voice: grouped[vi][0].id }));
                } catch (e) { setStatus('Lỗi tải danh sách giọng.'); }
            };

            // --- XỬ LÝ ĐĂNG NHẬP / ĐĂNG KÝ (ĐÃ TỐI ƯU ĐỂ TRÁNH LỖI SAI MẬT KHẨU) ---
            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true); 
                setAuthMsg({ t: 'info', m: 'Đang kết nối máy chủ...' });
                
                try {
                    // Xử lý làm sạch input để tránh lỗi ký tự trắng
                    const u = authForm.username.trim();
                    const p = authForm.password.trim();
                    
                    const url = `${GOOGLE_SCRIPT_URL}?action=${authMode}&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    if (data.success) {
                        if (authMode === 'login') { 
                            setIsAuthenticated(true); 
                            setAuthMsg({ t: '', m: '' });
                        } 
                        else { 
                            setAuthMsg({ t: 'success', m: data.message }); 
                            setAuthMode('login'); 
                        }
                    } else { 
                        setAuthMsg({ t: 'error', m: data.message }); 
                    }
                } catch (e) { 
                    setAuthMsg({ t: 'error', m: 'Lỗi máy chủ! Vui lòng kiểm tra lại đường link Triển khai (Deploy).' }); 
                } finally { 
                    setLoading(false); 
                }
            };

            const synthesize = (chunk) => {
                return new Promise((resolve, reject) => {
                    const connId = 'xxxxxxxxxxxx4xxxyxxxxxxxxxxxxxxx'.replace(/[xy]/g, (c) => (c==='x'?Math.random()*16|0:(Math.random()*16|0&0x3|0x8)).toString(16));
                    const ws = new WebSocket(`wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=6A5AA1D4EAFF4E9FB37E23D68491D6F4&ConnectionId=${connId}&Sec-MS-GEC-Version=1-130.0.2849.68`);
                    let audioData = [];
                    const timer = setTimeout(() => { ws.close(); reject(new Error("Hết thời gian kết nối Azure")); }, 30000);
                    
                    ws.onopen = () => {
                        const ts = new Date().toString();
                        ws.send(`X-Timestamp:${ts}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`);
                        const r = Math.round((config.rate - 1) * 100);
                        const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='vi-VN'><voice name='${config.voice}'><prosody pitch='${config.pitch}Hz' rate='${r>=0?'+':''}${r}%' volume='${config.vol-100}%'>${chunk.replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</prosody></voice></speak>`;
                        ws.send(`X-RequestId:${connId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${ts}\r\nPath:ssml\r\n\r\n${ssml}`);
                    };
                    ws.onmessage = async (e) => {
                        if (typeof e.data === 'string' && e.data.includes("Path:turn.end")) { clearTimeout(timer); ws.close(); resolve(new Blob(audioData, {type:'audio/mp3'})); }
                        else if (e.data instanceof Blob) { const b = await e.data.arrayBuffer(); audioData.push(b.slice(2 + new DataView(b).getUint16(0))); }
                    };
                    ws.onerror = () => reject(new Error("Lỗi mạng/WebSocket"));
                });
            };

            const processAll = async () => {
                setIsProcessing(true); setProgress(0); setStatus('Đang khởi tạo...');
                try {
                    const run = async (c, n) => {
                        const blob = await synthesize(c);
                        if (dirHandle) { const h = await dirHandle.getFileHandle(`${n}.mp3`, {create:true}); const w = await h.createWritable(); await w.write(blob); await w.close(); }
                        else { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${n}.mp3`; a.click(); }
                    };
                    if (activeTab === 'text') { await run(text, outputName || `Audio_${Date.now()}`); setProgress(100); }
                    else { 
                        for(let i=0; i<files.length; i++) { 
                            setStatus(`Đang đọc file: ${files[i].name}`);
                            await run(await files[i].text(), files[i].name.replace('.txt',''));
                            setProgress(Math.round(((i+1)/files.length)*100));
                        }
                    }
                    setStatus('Đã hoàn tất!');
                } catch(e) { setStatus(`Lỗi: ${e.message}`); } finally { setIsProcessing(false); }
            };

            // --- GIAO DIỆN ĐĂNG NHẬP / ĐĂNG KÝ ---
            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#f0f0f0]">
                    <div className="bg-white p-8 win-shadow w-full max-w-[420px]">
                        <h2 className="text-center text-2xl font-bold text-blue-700 mb-6 underline tracking-wide">Edge TTS Studio</h2>
                        <div className="flex border-b mb-6 bg-gray-100 p-1">
                            <button onClick={() => setAuthMode('login')} className={`flex-1 py-2 font-bold transition-all ${authMode === 'login' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>Đăng nhập</button>
                            <button onClick={() => setAuthMode('register')} className={`flex-1 py-2 font-bold transition-all ${authMode === 'register' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>Đăng ký</button>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-5">
                            <div>
                                <label className="block font-bold mb-1 text-gray-700 uppercase text-[11px]">Tài khoản:</label>
                                <input type="text" className="w-full win-input p-2.5 outline-none focus:border-blue-500" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} required placeholder="Nhập tài khoản" />
                            </div>
                            <div>
                                <label className="block font-bold mb-1 text-gray-700 uppercase text-[11px]">Mật khẩu:</label>
                                <div className="relative">
                                    <input type={showPass ? "text" : "password"} className="w-full win-input p-2.5 outline-none pr-14 focus:border-blue-500" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} required placeholder="Nhập mật khẩu" />
                                    <button type="button" onClick={() => setShowPass(!showPass)} className="absolute right-1 top-1 text-[10px] bg-[#eee] border border-gray-400 px-2 py-1.5 font-bold hover:bg-gray-200 transition-colors uppercase">
                                        {showPass ? "ẨN" : "XEM"}
                                    </button>
                                </div>
                            </div>
                            {authMsg.m && (
                                <div className={`p-3 text-[12px] border ${authMsg.t==='error'?'bg-red-50 text-red-600 border-red-200':'bg-blue-50 text-blue-600 border-blue-200'}`}>
                                    <b>{authMsg.t === 'error' ? 'LỖI: ' : 'THÔNG BÁO: '}</b> {authMsg.m}
                                </div>
                            )}
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-3 font-bold hover:bg-blue-700 disabled:bg-gray-400 shadow-md uppercase tracking-widest text-[14px]">
                                {loading ? 'Đang xác thực...' : (authMode==='login'?'Vào hệ thống':'Gửi yêu cầu đăng ký')}
                            </button>
                        </form>
                        <div className="mt-8 text-center text-[12px] text-gray-500 border-t pt-5">
                            <p className="font-bold text-blue-800 text-[13px]">LIÊN HỆ ADMIN ĐỨC DƯƠNG</p>
                            <p className="text-red-600 font-bold mt-1">Zalo: 0332.696.777</p>
                        </div>
                    </div>
                </div>
            );

            // --- GIAO DIỆN CHÍNH CỦA APP ---
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-[#f0f0f0] border border-[#888] shadow-2xl w-full max-w-[1050px] h-[90vh] flex flex-col overflow-hidden">
                        <div className="bg-white p-2 border-b flex justify-between items-center text-[12px]">
                            <span className="font-bold text-gray-600">Dịch vụ online chuyển văn bản thành âm thanh. Nền tảng: Microsoft Azure (Edge TTS).</span>
                            <button onClick={() => setIsAuthenticated(false)} className="win-btn px-4 py-1 font-bold text-red-700 hover:text-red-900 border-[#999]">ĐĂNG XUẤT</button>
                        </div>
                        <div className="flex-1 p-3 flex flex-col gap-3 overflow-hidden">
                            <div className="flex bg-[#ddd] border-b border-[#999]">
                                <button onClick={()=>setActiveTab('text')} className={`px-6 py-2 border-r border-[#999] ${activeTab==='text'?'bg-white font-bold text-blue-700':'hover:bg-[#eee]'}`}>VĂN BẢN</button>
                                <button onClick={()=>setActiveTab('files')} className={`px-6 py-2 border-r border-[#999] ${activeTab==='files'?'bg-white font-bold text-blue-700':'hover:bg-[#eee]'}`}>TẬP TIN CHỮ (.TXT)</button>
                            </div>
                            <div className="flex-1 bg-white win-input overflow-hidden flex flex-col">
                                {activeTab==='text' ? <textarea className="flex-1 p-4 outline-none resize-none text-[14px] leading-relaxed" value={text} onChange={e=>setText(e.target.value)} placeholder="Nhập hoặc dán văn bản của bạn vào đây..."/> : 
                                <div className="flex-1 p-3 bg-[#f9f9f9] flex flex-col gap-2 overflow-hidden">
                                    <div className="flex justify-between border-b pb-2">
                                        <span className="font-bold">Danh sách tập tin: {files.length}</span>
                                        <div className="flex gap-2">
                                            <label className="win-btn px-4 py-1 text-xs font-bold cursor-pointer">CHỌN FILE<input type="file" multiple accept=".txt" className="hidden" onChange={e=>setFiles([...files,...Array.from(e.target.files)])}/></label>
                                            <button onClick={()=>setFiles([])} className="win-btn px-4 py-1 text-xs font-bold">XÓA HẾT</button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-1 p-2">
                                        {files.map((f,i)=><div key={i} className="py-1.5 px-3 border-b text-blue-800 font-medium bg-white truncate flex items-center gap-2"><span className="text-gray-400">📄</span> {f.name}</div>)}
                                        {files.length === 0 && <div className="text-center mt-20 text-gray-400 italic font-medium">Bạn có thể chọn nhiều file .txt để xử lý hàng loạt cùng lúc...</div>}
                                    </div>
                                </div>}
                            </div>
                            <div className="flex items-center gap-4 bg-white p-2 border border-gray-300">
                                <span className="font-bold text-gray-600">Tên file xuất:</span>
                                <input className="flex-1 win-input p-1.5 outline-none focus:bg-blue-50" value={outputName} onChange={e=>setOutputName(e.target.value)} placeholder="Tên file (để trống sẽ tự tạo tên theo ngày giờ)..."/>
                                <button className="win-btn px-4 py-1.5 font-bold flex items-center gap-2" onClick={async ()=>{try{setDirHandle(await window.showDirectoryPicker({mode:'readwrite'}));}catch(e){}}}>
                                    {dirHandle ? `📁 ${dirHandle.name}` : "📁 CHỌN THƯ MỤC LƯU"}
                                </button>
                            </div>
                            <fieldset className="border border-[#aaa] p-4 pt-6 relative mt-1 bg-white">
                                <legend className="absolute -top-3 left-4 bg-[#f0f0f0] px-2 text-blue-800 font-bold uppercase text-[11px] border border-[#aaa]">Thông số Microsoft Azure</legend>
                                <div className="grid grid-cols-12 gap-y-3 gap-x-6 items-center">
                                    <div className="col-span-1 font-bold">Ngôn ngữ:</div>
                                    <select className="col-span-5 win-input p-1.5 outline-none bg-gray-50" value={config.lang} onChange={e=>setConfig({...config,lang:e.target.value,voice:voices[e.target.value][0].id})}>{Object.keys(voices).map(l=><option key={l} value={l}>{l}</option>)}</select>
                                    <div className="col-span-1 text-right font-bold">Giọng đọc:</div>
                                    <select className="col-span-5 win-input p-1.5 outline-none bg-gray-50" value={config.voice} onChange={e=>setConfig({...config,voice:e.target.value})}>{voices[config.lang]?.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</select>
                                    
                                    <div className="col-span-1 font-bold">Tốc độ:</div>
                                    <div className="col-span-3 flex gap-2 items-center">
                                        <input type="number" step="0.1" className="w-20 win-input p-1.5 text-right" value={config.rate} onChange={e=>setConfig({...config,rate:parseFloat(e.target.value)})}/>
                                        <span className="text-gray-400 text-[11px] italic">(0.5 đến 2.0)</span>
                                    </div>
                                    
                                    <div className="col-span-2 text-right font-bold">Cao độ (Hz):</div>
                                    <input type="number" className="col-span-2 win-input p-1.5 text-right" value={config.pitch} onChange={e=>setConfig({...config,pitch:parseInt(e.target.value)})}/>
                                    
                                    <div className="col-span-2 text-right font-bold">Âm lượng:</div>
                                    <div className="col-span-2 flex gap-1">
                                        <input type="number" className="flex-1 win-input p-1.5 text-right" value={config.vol} onChange={e=>setConfig({...config,vol:parseInt(e.target.value)})}/>
                                        <button className="win-btn px-2 text-[10px] font-bold" onClick={()=>setConfig({...config,rate:1,pitch:0,vol:100})}>RESET</button>
                                    </div>
                                    
                                    <div className="col-span-12 flex items-center gap-6 mt-1 border-t pt-3">
                                        <label className="flex items-center gap-2 cursor-pointer group">
                                            <input type="checkbox" checked={config.srt} onChange={e=>setConfig({...config,srt:e.target.checked})} className="w-4 h-4 accent-blue-600" /> 
                                            <b className="group-hover:text-blue-700">XUẤT KÈM PHỤ ĐỀ (.SRT)</b>
                                        </label>
                                        <div className="text-gray-300">|</div>
                                        <div className="flex gap-2 items-center">
                                            <span className="font-medium">Chia đoạn dài mỗi:</span>
                                            <input type="number" className="w-16 win-input p-1 text-center" value={config.chunk} onChange={e=>setConfig({...config, chunk: parseInt(e.target.value)})} /> 
                                            <span className="text-gray-500">từ</span>
                                        </div>
                                    </div>
                                </div>
                            </fieldset>
                        </div>
                        <div className="bg-[#ddd] p-3 flex items-center gap-5 border-t border-[#999]">
                            <div className="w-60 truncate font-mono text-[11px] text-blue-700 font-bold bg-[#eee] p-1.5 border border-[#bbb]" title={status}>{status}</div>
                            <div className="flex-1 bg-white border border-[#888] h-6 relative overflow-hidden shadow-inner">
                                <div className="bg-green-600 h-full transition-all duration-300 shadow-[0_0_10px_rgba(0,0,0,0.2)]" style={{width:`${progress}%`}}/>
                                <div className="absolute inset-0 flex items-center justify-center font-bold text-[11px] text-shadow">{progress}%</div>
                            </div>
                            <button onClick={processAll} disabled={isProcessing||(activeTab==='text'&&!text.trim())||(activeTab==='files'&&files.length===0)} className="bg-blue-700 text-white px-12 py-2.5 font-bold hover:bg-blue-800 shadow-lg active:shadow-inner transition-all uppercase tracking-widest text-[14px]">
                                {isProcessing ? 'ĐANG XỬ LÝ...' : 'TẠO VÀ LƯU NGAY'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
